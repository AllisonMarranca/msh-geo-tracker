name: GEO Scan

on:
  # Weekly on Mondays at 09:00 UTC (~5am ET / 4am ET DST). Adjust if you want a
  # different cadence — see https://crontab.guru
  schedule:
    - cron: "0 9 * * 1"
  # Lets you trigger a run manually from the Actions tab
  workflow_dispatch:
    inputs:
      scan_limit:
        description: "Optional: limit to first N clients (smoke test). Leave blank for all."
        required: false
        default: ""

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit scan_results.json back

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scanner
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SCAN_LIMIT:         ${{ github.event.inputs.scan_limit }}
          PYTHONUNBUFFERED:   "1"
        run: python scripts/scan.py

      - name: Commit & push updated scan_results.json
        run: |
          if git diff --quiet scan_results.json; then
            echo "No changes to scan_results.json — skipping commit."
            exit 0
          fi
          git config user.name  "geo-scan-bot"
          git config user.email "geo-scan-bot@users.noreply.github.com"
          git add scan_results.json
          git commit -m "chore(scan): auto-update results $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
